<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LeArm Control</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f0f;
    color: #e0e0e0;
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }

  .panel {
    width: 100%;
    max-width: 520px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.05em; }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #333;
    display: inline-block;
    margin-right: 6px;
    transition: background 0.3s;
  }
  .dot.on  { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
  .dot.err { background: #ef4444; }

  .status-label { font-size: 12px; color: #666; }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 36px;
  }

  button {
    flex: 1;
    padding: 12px;
    border: 1px solid #333;
    border-radius: 6px;
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover { background: #222; border-color: #555; }
  button.active { background: #14532d; border-color: #22c55e; color: #86efac; }
  button.mode-active { background: #1e3a5f; border-color: #60a5fa; color: #93c5fd; }
  button:disabled { opacity: 0.4; cursor: default; }

  section { margin-bottom: 32px; }

  h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #555;
    margin-bottom: 16px;
  }

  .row {
    display: grid;
    grid-template-columns: 100px 1fr 52px;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .row label { color: #aaa; font-size: 13px; }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: #2a2a2a;
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #60a5fa;
    cursor: pointer;
    transition: background 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:hover { background: #93c5fd; }

  .val {
    text-align: right;
    color: #60a5fa;
    font-size: 13px;
    min-width: 52px;
  }

  .servo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .servo-item {
    background: #1a1a1a;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 12px;
  }

  .servo-item label {
    display: block;
    color: #666;
    font-size: 11px;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }

  .servo-item input[type=range] { margin-bottom: 4px; }

  .servo-val {
    text-align: right;
    color: #60a5fa;
    font-size: 12px;
  }

  .spin-clap-info {
    background: #1a1a1a;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 16px;
    color: #666;
    font-size: 12px;
    line-height: 1.8;
  }

  .spin-clap-info span { color: #aaa; }

  #error {
    margin-top: 16px;
    color: #f87171;
    font-size: 12px;
    min-height: 16px;
  }
</style>
</head>
<body>
<div class="panel">
  <header>
    <h1>LeArm Control</h1>
    <div>
      <span class="dot" id="dot"></span>
      <span class="status-label" id="status-label">disconnected</span>
    </div>
  </header>

  <section>
    <h2>Mode</h2>
    <div class="controls" style="margin-bottom: 0;">
      <button id="btn-mode-wave"      class="mode-active" onclick="setMode('wave')">WAVE</button>
      <button id="btn-mode-spin-clap"                     onclick="setMode('spin_clap')">SPIN &amp; CLAP</button>
    </div>
  </section>

  <div class="controls" style="margin-top: 24px;">
    <button id="btn-start" onclick="startAnim()">START</button>
    <button id="btn-stop"  onclick="stopAnim()" disabled>STOP</button>
  </div>

  <div id="wave-params">
    <section>
      <h2>Wave Shape</h2>

      <div class="row">
        <label>Amplitude</label>
        <input type="range" id="amplitude" min="0" max="400" step="5" value="120"
               oninput="syncParam('amplitude', this.value)">
        <div class="val" id="amplitude-val">120</div>
      </div>

      <div class="row">
        <label>Period (s)</label>
        <input type="range" id="period" min="1" max="20" step="0.5" value="5"
               oninput="syncParam('period', this.value)">
        <div class="val" id="period-val">5.0s</div>
      </div>

      <div class="row">
        <label>Phase lag</label>
        <input type="range" id="phase_step" min="0" max="1.57" step="0.05" value="0.40"
               oninput="syncParam('phase_step', this.value)">
        <div class="val" id="phase_step-val">0.40</div>
      </div>
    </section>

    <section>
      <h2>Center Positions</h2>
      <div class="servo-grid" id="servo-grid"></div>
    </section>
  </div>

  <div id="spin-clap-params" style="display:none;">
    <section>
      <h2>Sequence</h2>
      <div class="spin-clap-info">
        <span>Condense</span> → <span>Rise &amp; unfurl</span> → <span>Clap ×2</span> → <span>Condense</span> → repeat
      </div>
    </section>
  </div>

  <div id="error"></div>
</div>

<script>
const JOINTS   = [6, 5, 4, 3, 2, 1];
const LABELS   = ['6 — Waist', '5 — Shoulder', '4 — Elbow', '3 — Wrist pitch', '2 — Wrist roll', '1 — Gripper'];
const MINIMUMS = [500, 500, 500, 500, 500, 1500];

let centers   = [1500, 1500, 1500, 1000, 1500, 1500];
let sendTimer = null;
let currentMode = 'wave';

// Build servo center sliders
const grid = document.getElementById('servo-grid');
JOINTS.forEach((sid, i) => {
  const min = MINIMUMS[i];
  grid.innerHTML += `
    <div class="servo-item">
      <label>${LABELS[i]}</label>
      <input type="range" id="center-${i}" min="${min}" max="2500" step="10" value="${centers[i]}"
             oninput="syncCenter(${i}, this.value)">
      <div class="servo-val" id="center-val-${i}">${centers[i]}</div>
    </div>`;
});

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-mode-wave').classList.toggle('mode-active', mode === 'wave');
  document.getElementById('btn-mode-spin-clap').classList.toggle('mode-active', mode === 'spin_clap');
  document.getElementById('wave-params').style.display      = mode === 'wave'      ? '' : 'none';
  document.getElementById('spin-clap-params').style.display = mode === 'spin_clap' ? '' : 'none';
  fetch('/api/params', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ mode }),
  });
}

function syncParam(key, value) {
  document.getElementById(`${key}-val`).textContent =
    key === 'period'     ? parseFloat(value).toFixed(1) + 's' :
    key === 'phase_step' ? parseFloat(value).toFixed(2) : value;
  scheduleSend();
}

function syncCenter(i, value) {
  centers[i] = parseInt(value);
  document.getElementById(`center-val-${i}`).textContent = value;
  scheduleSend();
}

function scheduleSend() {
  clearTimeout(sendTimer);
  sendTimer = setTimeout(sendParams, 60);
}

async function sendParams() {
  const body = {
    amplitude:  parseFloat(document.getElementById('amplitude').value),
    period:     parseFloat(document.getElementById('period').value),
    phase_step: parseFloat(document.getElementById('phase_step').value),
    centers:    [...centers],
    mode:       currentMode,
  };
  await fetch('/api/params', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
}

async function startAnim() {
  await sendParams();
  await fetch('/api/start', { method: 'POST' });
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled  = false;
  document.getElementById('btn-start').classList.add('active');
  document.getElementById('btn-mode-wave').disabled      = true;
  document.getElementById('btn-mode-spin-clap').disabled = true;
}

async function stopAnim() {
  await fetch('/api/stop', { method: 'POST' });
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled  = true;
  document.getElementById('btn-start').classList.remove('active');
  document.getElementById('btn-mode-wave').disabled      = false;
  document.getElementById('btn-mode-spin-clap').disabled = false;
}

async function poll() {
  try {
    const r = await fetch('/api/status');
    const s = await r.json();
    const dot = document.getElementById('dot');
    const lbl = document.getElementById('status-label');
    const err = document.getElementById('error');

    if (s.connected) {
      dot.className = 'dot on';
      lbl.textContent = 'connected';
    } else if (s.error) {
      dot.className = 'dot err';
      lbl.textContent = 'error';
    } else {
      dot.className = 'dot';
      lbl.textContent = s.running ? 'connecting…' : 'disconnected';
    }

    err.textContent = s.error || '';

    const running = s.running;
    document.getElementById('btn-start').disabled = running;
    document.getElementById('btn-stop').disabled  = !running;
    document.getElementById('btn-start').classList.toggle('active', running);
    document.getElementById('btn-mode-wave').disabled      = running;
    document.getElementById('btn-mode-spin-clap').disabled = running;
  } catch (_) {}
}

setInterval(poll, 800);
poll();
</script>
</body>
</html>
